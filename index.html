<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSOT — Fondo BBVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F8F9FB;--bg2:#FFFFFF;--bg3:#F2F4F7;--bg4:#EAECF0;
  --line:#E4E7EC;--line2:#D0D5DD;
  --txt:#101828;--txt2:#475467;--txt3:#98A2B3;
  --grn:#027A48;--grn2:#ECFDF3;--grn3:#D1FADF;
  --red:#B42318;--red2:#FEF3F2;--red3:#FEE4E2;
  --amb:#B54708;--amb2:#FFFAEB;--amb3:#FEF0C7;
  --blue:#1D4ED8;--blue2:#EFF6FF;--blue3:#DBEAFE;
  --purple:#5B21B6;--purple2:#F5F3FF;
  --accent:#0C4A6E;--accent2:#E0F2FE;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
  --r:6px;--r2:10px;--r3:14px;
  --sh:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --sh2:0 4px 8px rgba(16,24,40,.12),0 2px 4px rgba(16,24,40,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
.side{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;box-shadow:var(--sh)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--sh)}
.scroll{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.brand{padding:16px 20px;border-bottom:1px solid var(--line)}
.brand-logo{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.brand-t{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.brand-s{font-size:11px;color:var(--txt3);margin-top:1px}
.nav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--txt2);font-size:13px;font-weight:400;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans)}
.ni:hover{background:var(--bg3);color:var(--txt)}
.ni.active{background:var(--accent2);color:var(--accent);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75}
.side-foot{padding:14px 18px;border-top:1px solid var(--line);background:var(--bg3)}
.side-foot-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.side-foot-v{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--txt)}
.tb-title{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
.tb-date{font-size:12px;color:var(--txt3);margin-top:1px}
.spacer{flex:1}
.btn{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line2);transition:all .12s;font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;background:var(--bg2);color:var(--txt2)}
.btn:hover{background:var(--bg3);color:var(--txt)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}.btn-p:hover{background:#0F5A8A;border-color:#0F5A8A;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red2);border-color:var(--red3);color:var(--red)}
.sec-h{display:flex;align-items:center;gap:0;margin-bottom:14px}
.sec-h-bar{width:4px;height:20px;background:var(--accent);border-radius:2px;margin-right:10px;flex-shrink:0}
.sec-h-text{font-size:13px;font-weight:700;color:var(--txt);letter-spacing:-.01em;text-transform:uppercase}
.sec-h-sub{font-size:11px;color:var(--txt3);margin-left:auto}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh)}
.card-t{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r2) 0 0 var(--r2)}
.stat-blue::before{background:var(--blue)}.stat-grn::before{background:var(--grn)}.stat-red::before{background:var(--red)}.stat-amb::before{background:var(--amb)}.stat-acc::before{background:var(--accent)}
.stat-l{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.stat-v{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-.02em}
.stat-s{font-size:12px;color:var(--txt3);margin-top:5px;font-family:var(--mono)}
.g{color:var(--grn)}.r{color:var(--red)}.d{color:var(--txt3)}.a{color:var(--amb)}.b{color:var(--blue)}.ac{color:var(--accent)}
.bg-g{background:var(--grn2);color:var(--grn)}.bg-r{background:var(--red2);color:var(--red)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:2px solid var(--line2)}
th{padding:9px 12px;text-align:left;color:var(--txt3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;cursor:pointer;user-select:none;background:var(--bg3)}
th:hover{color:var(--txt2)}
th.asc::after{content:" ↑";color:var(--accent)}
th.desc::after{content:" ↓";color:var(--accent)}
td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
td.lbl{font-weight:600;color:var(--txt)}
td.dim{color:var(--txt2);font-size:12px;max-width:180px;white-space:normal}
td.mono{font-family:var(--mono);font-size:12px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.p-buy{background:var(--grn3);color:var(--grn)}.p-sell{background:var(--red3);color:var(--red)}.p-etf{background:var(--blue3);color:var(--blue)}
.p-open{background:var(--amb3);color:var(--amb)}.p-closed{background:var(--bg4);color:var(--txt3)}
.p-growth{background:var(--blue3);color:var(--blue)}.p-value{background:var(--grn3);color:var(--grn)}.p-blend{background:var(--bg4);color:var(--txt2)}
.p-up{background:var(--grn2);color:var(--grn)}.p-down{background:var(--red2);color:var(--red)}.p-lat{background:var(--amb2);color:var(--amb)}
.bar-bg{background:var(--bg4);border-radius:99px;height:5px;overflow:hidden;margin-top:5px}
.bar-f{height:5px;border-radius:99px;transition:width .4s}
.wu-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.wu-row:last-child{border-bottom:none}
.wu-t{font-family:var(--mono);font-size:12px;font-weight:600;width:95px;flex-shrink:0;color:var(--txt)}
.wu-bars{flex:1;position:relative;height:22px}
.wu-fund{position:absolute;top:1px;height:9px;border-radius:3px;background:var(--accent);opacity:.8}
.wu-bench{position:absolute;top:12px;height:9px;border-radius:3px;background:var(--purple);opacity:.6}
.wu-d{font-family:var(--mono);font-size:12px;width:56px;text-align:right;flex-shrink:0;font-weight:600}
.wu-leg{display:flex;gap:14px;margin-top:10px}
.wu-leg span{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:5px}
.wu-dot{display:inline-block;width:8px;height:8px;border-radius:2px}
.spark{display:flex;align-items:flex-end;gap:2px;height:40px}
.spark-b{flex:1;min-width:3px;border-radius:2px 2px 0 0}
.frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:8px 11px;color:var(--txt);font-family:var(--sans);font-size:13px;outline:none;width:100%;transition:border .12s;box-shadow:0 1px 2px rgba(16,24,40,.05)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(12,74,110,.1)}
input::placeholder{color:var(--txt3)}
select option{background:var(--bg2)}
textarea{font-family:var(--sans);resize:vertical;font-size:13px}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r2);max-height:240px;overflow-y:auto;z-index:400;display:none;box-shadow:var(--sh2)}
.ac-list.open{display:block}
.ac-item{padding:9px 13px;cursor:pointer;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line);transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.hi{background:var(--bg3)}
.ac-t{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);width:100px;flex-shrink:0}
.ac-n{font-size:12px;color:var(--txt2);flex:1}
.ac-b{font-size:10px;padding:1px 7px;border-radius:99px;flex-shrink:0}
.ps{font-size:11px;padding:2px 7px;border-radius:4px;font-family:var(--mono)}
.ps-load{color:var(--amb);background:var(--amb2)}.ps-ok{color:var(--grn);background:var(--grn2)}.ps-err{color:var(--red);background:var(--red2)}
.resumen{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);padding:11px 14px;font-size:12px;display:none;gap:20px;flex-wrap:wrap}
.overlay{display:none;position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r3);padding:26px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,24,40,.3)}
.modal-t{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.a-err{background:var(--red2);border:1px solid var(--red3);color:var(--red)}.a-ok{background:var(--grn2);border:1px solid var(--grn3);color:var(--grn)}
.a-info{background:var(--blue2);border:1px solid var(--blue3);color:var(--blue)}.a-warn{background:var(--amb2);border:1px solid var(--amb3);color:var(--amb)}
.divider{border:none;border-top:1px solid var(--line);margin:14px 0}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:16px}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;color:var(--txt3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;font-family:var(--sans)}
.tab-btn:hover{color:var(--txt)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#treemap{width:100%;height:220px;position:relative;overflow:hidden;border-radius:var(--r)}
.tm-cell{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:3px;cursor:default;overflow:hidden;transition:filter .15s;border:2px solid var(--bg2)}
.tm-cell:hover{filter:brightness(1.08);z-index:5}
.tm-tick{font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);pointer-events:none}
.tm-pct{font-size:10px;color:rgba(255,255,255,.85);pointer-events:none}
canvas{display:block;width:100%!important}
.empty{text-align:center;padding:32px;color:var(--txt3);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.scroll>*{animation:fadeIn .18s ease both}
@media(max-width:1000px){.sg4{grid-template-columns:repeat(2,1fr)}.sg2{grid-template-columns:1fr}}
@media(max-width:640px){.side{display:none}.sg4{grid-template-columns:1fr 1fr}}

/* ── FIREBASE SYNC ── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.sync-ok{background:#027A48}.sync-off{background:#98A2B3}.sync-err{background:#B42318}.sync-saving{background:#B54708;animation:pulse .8s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3);padding:5px 10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--line);cursor:pointer}
.sync-bar:hover{background:var(--bg4)}
.fb-setup{background:var(--blue2);border:1px solid var(--blue3);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;font-size:13px}
.fb-setup-t{font-weight:600;color:var(--blue);margin-bottom:6px;font-size:13px}
.fb-setup pre{background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;margin:8px 0;color:var(--txt2);overflow-x:auto}

</style>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="shell">
<div class="side">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon"><svg viewBox="0 0 18 18"><path d="M9 2L10.8 6.6L16 7.3L12.5 10.7L13.4 16L9 13.5L4.6 16L5.5 10.7L2 7.3L7.2 6.6Z" stroke-linejoin="round"/></svg></div>
      <div><div class="brand-t">Research Rockets</div><div class="brand-s">SSOT · Fondo BBVA · BMV</div></div>
    </div>
  </div>
  <nav class="nav" id="nav">
    <div class="nav-section">Principal</div>
    <button class="ni active" onclick="go('dashboard')"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard</button>
    <button class="ni" onclick="go('ordenes')"><svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Órdenes</button>
    <button class="ni" onclick="go('posicion')"><svg viewBox="0 0 16 16"><path d="M1 12l4-4 3 3 4-5 3 2"/></svg>Posición</button>
    <div class="nav-section">Análisis</div>
    <button class="ni" onclick="go('rendimiento')"><svg viewBox="0 0 16 16"><rect x="1" y="8" width="3" height="6"/><rect x="6" y="4" width="3" height="10"/><rect x="11" y="1" width="3" height="13"/></svg>Rendimiento</button>
    <button class="ni" onclick="go('riesgo')"><svg viewBox="0 0 16 16"><path d="M8 2l1.5 4H14l-3.7 2.7 1.4 4.3L8 11l-3.7 2 1.4-4.3L2 6h4.5z"/></svg>Riesgo</button>
    <button class="ni" onclick="go('universo')"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 2c-2 2-3 4-3 6s1 4 3 6M8 2c2 2 3 4 3 6s-1 4-3 6M2 8h12"/></svg>Universo</button>
    <button class="ni" onclick="go('analytics')"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>Analytics</button>
    <div class="nav-section">Gestión</div>
    <button class="ni" onclick="go('flujos')"><svg viewBox="0 0 16 16"><path d="M8 2v12M2 6l6-4 6 4M2 10l6 4 6-4"/></svg>Flujos & Ajustes</button>
    <button class="ni" onclick="go('estadisticos')" id="ni-est"><svg viewBox="0 0 16 16" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75"><path d="M1 13l4-8 3 5 2-3 3 6"/></svg>Estadísticos</button>
    <button class="ni" onclick="go('config')"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/></svg>Configuración</button>
  </nav>
  <div class="side-foot">
    <div class="side-foot-l">Capital inicial</div>
    <div class="side-foot-v" id="side-cap">—</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div><div class="tb-title" id="tb-title">Dashboard</div><div class="tb-date" id="tb-date"></div></div>
    <div class="spacer"></div>
    <div class="sync-bar" id="sync-bar" title="Click para abrir config de Firebase">
      <span class="sync-dot sync-off" id="sync-dot"></span>
      <span id="sync-label">Sin conectar</span>
      <span style="color:var(--line2);margin:0 2px">|</span>
      <span style="font-size:10px;cursor:pointer;color:var(--blue)" onclick="go('config')">config</span>
      <span style="font-size:10px;cursor:pointer;color:var(--txt3);margin-left:4px" onclick="forceSyncNow()" title="Forzar sincronización">↑</span>
    </div>
    <button class="btn btn-sm" onclick="openPrecioModal()">↻ Precios</button>
    <button class="btn btn-p btn-sm" onclick="openOrdenModal()">+ Nueva orden</button>
  </div>
  <div class="scroll" id="content"></div>
</div>
</div>

<div class="overlay" id="m-orden">
<div class="modal">
  <div class="modal-t"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>Nueva orden</div>
  <div id="m-alert"></div>
  <div style="display:flex;flex-direction:column;gap:13px">
    <div class="frow">
      <div class="fg"><label class="fl">Tipo</label><select id="o-tipo"><option value="compra">Compra</option><option value="venta">Venta</option></select></div>
      <div class="fg"><label class="fl">Fecha</label><input type="date" id="o-fecha" onchange="onFecha()"></div>
    </div>
    <div class="fg"><label class="fl">Emisora</label>
      <div class="ac-wrap"><input type="text" id="o-emisora" placeholder="Buscar ticker o nombre…" autocomplete="off" oninput="acInput(this.value)" onkeydown="acKey(event)" onfocus="acInput(this.value)"><div class="ac-list" id="ac-list"></div></div>
      <div style="margin-top:4px;font-size:12px;color:var(--txt3)" id="o-info"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Títulos</label><input type="number" id="o-titulos" placeholder="1,000" min="1" oninput="calcRes()"></div>
      <div class="fg"><label class="fl">Comisión (%)</label><input type="number" id="o-com" value="0.30" step="0.01" oninput="calcRes()"></div>
    </div>
    <div class="fg"><label class="fl">Precio operado ($) <span id="o-ps"></span></label><input type="number" id="o-precio" placeholder="Cargando…" step="0.0001" oninput="calcRes()"></div>

function fbConfig(){

function initFirebase(cfg){
  if(!cfg||!cfg.apiKey)return false;
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    else firebase.app();
    db=firebase.firestore();
    _syncEnabled=true;
    startListener();
    setSyncStatus('ok','Sincronizado');
    return true;
  }catch(e){
    console.error('Firebase init error:',e);
    setSyncStatus('err','Error Firebase');
    return false;
  }
}

function startListener(){
  if(_unsubscribe){_unsubscribe();_unsubscribe=null;}
  if(!db)return;
  _unsubscribe=db.collection('fondos').doc('research_rockets')
    .onSnapshot(snap=>{
      if(snap.exists){
        const remote=snap.data();
        const remoteStr=JSON.stringify(remote);
        // Ignore echo of our own save; only update if truly external change
        if(remoteStr!==_lastSavedHash && remoteStr!==JSON.stringify(S)){
          S={...S,...remote};
          _lastSavedHash=remoteStr;
          // Re-render current page
          const cur=document.querySelector('.ni.active');
          const pages=['dashboard','ordenes','posicion','rendimiento','riesgo','universo','analytics','flujos','estadisticos','config'];
          const active=pages.find(p=>cur?.textContent?.toLowerCase().includes(p.slice(0,5)))||'dashboard';
          go(active);
          setSyncStatus('ok','Actualizado por equipo · '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}));
        }
      }
    }, err=>{setSyncStatus('err','Error: '+err.message);});
}

// PRICE LOOKUP
function localPrice(t,date){
  const db=PRICE_DB[t];if(!db)return null;
  if(date){
    if(db[date])return db[date];
    const dates=Object.keys(db).sort();
    let best=null;
    for(const d of dates){if(d<=date)best=d;else break;}
    return best?db[best]:null;
  }
  const dates=Object.keys(db).sort();
  return dates.length?db[dates[dates.length-1]]:null;
}
async function fetchPrice(t,date){
  const local=localPrice(t,date);
  if(local!=null)return{price:local,src:'DB'};
  try{
    const yf=encodeURIComponent(t+'.MX');
    const range=date?(()=>{const d=new Date(date),d1=Math.floor(d/1000),d2=d1+86400*3;return`period1=${d1}&period2=${d2}`;})():'range=5d';
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${yf}?interval=1d&${range}`;
    const res=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(6000)});
    const data=await res.json();
    const closes=data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
    if(!closes?.length)return null;
    const arr=date?closes:[...closes].reverse();
    const p=arr.find(v=>v!=null);
    return p?{price:+p.toFixed(4),src:'YF'}:null;
  }catch(e){return null;}
}

// POSITION ENGINE
function buildPos(){
  const pos={};
  for(const o of S.ordenes){
    if(!pos[o.ticker])pos[o.ticker]={titulos:0,costoTotal:0,precioActual:o.precio,isEtf:o.isEtf||false};
    const d=o.tipo==='compra'?o.titulos:-o.titulos;
    if(o.tipo==='compra')pos[o.ticker].costoTotal+=o.titulos*o.precio;
    pos[o.ticker].titulos+=d;
    if(o.precioActual)pos[o.ticker].precioActual=o.precioActual;
  }
  // Apply ajustes (splits etc)
  for(const a of S.ajustes||[]){
    if(pos[a.ticker]&&a.tipo==='split')pos[a.ticker].titulos*=a.factor;
    if(pos[a.ticker]&&a.tipo==='split_inverso')pos[a.ticker].titulos/=a.factor;
  }
  for(const t in pos)if(pos[t].titulos<=0)delete pos[t];
  return pos;
}
function portVal(pos){return Object.values(pos).reduce((s,p)=>s+p.titulos*p.precioActual,0);}

// HISTORICAL PORTFOLIO VALUE (from price DB)
function buildHistorical(){
  if(!S.ordenes.length)return[];
  const firstDate=S.ordenes.reduce((m,o)=>o.fecha<m?o.fecha:m,S.ordenes[0].fecha);
  const dates=ALL_DATES.filter(d=>d>=firstDate);
  const result=[];
  for(const date of dates){
    const pos={};
    for(const o of S.ordenes){
      if(o.fecha>date)continue;
      if(!pos[o.ticker])pos[o.ticker]={titulos:0,costoTotal:0,isEtf:o.isEtf||false};
      const d=o.tipo==='compra'?o.titulos:-o.titulos;
      if(o.tipo==='compra')pos[o.ticker].costoTotal+=o.titulos*o.precio;
      pos[o.ticker].titulos+=d;
    }
    for(const t in pos)if(pos[t].titulos<=0)delete pos[t];
    // Apply splits
    for(const a of S.ajustes||[]){
      if(a.fecha<=date&&pos[a.ticker]){
        if(a.tipo==='split')pos[a.ticker].titulos*=a.factor;
        if(a.tipo==='split_inverso')pos[a.ticker].titulos/=a.factor;
      }
    }
    let portValue=0;
    for(const t in pos){const p=localPrice(t,date);if(p!=null)portValue+=pos[t].titulos*p;}
    const costUpTo=S.ordenes.filter(o=>o.fecha<=date&&o.tipo==='compra').reduce((s,o)=>s+o.titulos*o.precio+o.comision+o.iva,0);
    // Add dividends received up to date
    const divUpTo=(S.flujos||[]).filter(f=>f.fecha<=date&&(f.tipo==='dividendo_efectivo'||f.tipo==='bmergob')).reduce((s,f)=>s+f.monto,0);
    const efectivo=Math.max(0,S.capitalInicial-costUpTo)+divUpTo;
    const totalFondo=portValue+efectivo;
    const rendAcum=S.capitalInicial>0?(totalFondo-S.capitalInicial)/S.capitalInicial*100:0;
    const mexP=localPrice('MEXTRAC09',date);
    const rendBench=S.benchmarkInicial>0&&mexP?(mexP-S.benchmarkInicial)/S.benchmarkInicial*100:null;
    result.push({date,portValue,totalFondo,efectivo,mexPrice:mexP,rendAcum,rendBench,retActivo:rendBench!=null?rendAcum-rendBench:null});
  }
  return result;
}

// OVERS/UNDERS
function calcWU(pos,totalFondo){
  if(totalFondo<=0)return[];
  const etfP=pos['MEXTRAC09'];
  const etfPct=etfP?etfP.titulos*etfP.precioActual/totalFondo*100:0;
  const all=new Set([...Object.keys(MEXTRAC_W)]);
  for(const t in pos)if(t!=='MEXTRAC09')all.add(t);
  return[...all].map(t=>{
    const directVal=pos[t]?pos[t].titulos*pos[t].precioActual:0;
    const direct=directVal/totalFondo*100;
    const indirect=etfPct*(MEXTRAC_W[t]||0)/100;
    const total=direct+indirect;
    const bench=MEXTRAC_W[t]||0;
    return{ticker:t,direct,indirect,total,bench,diff:total-bench,name:UNIVERSO.find(e=>e.t===t)?.n||t};
  }).sort((a,b)=>b.diff-a.diff);
}

// METRICS
function calcMetrics(){
  const pos=buildPos();
  const valPort=portVal(pos);
  const costoTotal=S.ordenes.filter(o=>o.tipo==='compra').reduce((s,o)=>s+o.titulos*o.precio+o.comision+o.iva,0);
  const divTotal=(S.flujos||[]).filter(f=>f.tipo==='dividendo_efectivo'||f.tipo==='bmergob').reduce((s,f)=>s+f.monto,0);
  const efectivo=Math.max(0,S.capitalInicial-costoTotal)+divTotal;
  const totalFondo=valPort+efectivo;
  const rendAcum=S.capitalInicial>0?(totalFondo-S.capitalInicial)/S.capitalInicial*100:0;
  const last=S.snapshots[S.snapshots.length-1];
  const rendBench=S.benchmarkInicial>0&&last?.valorBench>0?(last.valorBench-S.benchmarkInicial)/S.benchmarkInicial*100:0;
  const snaps=S.snapshots;
  let rSem=0,rbSem=0;
  if(snaps.length>=2){
    const p=snaps[Math.max(0,snaps.length-6)],c=snaps[snaps.length-1];
    if(p.valorPortafolio>0)rSem=(c.valorPortafolio-p.valorPortafolio)/p.valorPortafolio*100;
    if(p.valorBench>0&&c.valorBench>0)rbSem=(c.valorBench-p.valorBench)/p.valorBench*100;
  }
  let stdDev=0,te=0,beta=1,ir=0,varH=0;
  const hist=buildHistorical();
  if(hist.length>=3){
    const rd=[],rb=[];
    for(let i=1;i<hist.length;i++){
      if(hist[i-1].totalFondo>0)rd.push((hist[i].totalFondo-hist[i-1].totalFondo)/hist[i-1].totalFondo*100);
      else rd.push(0);
      if(hist[i].rendBench!=null&&hist[i-1].rendBench!=null&&hist[i-1].mexPrice>0)
        rb.push((hist[i].mexPrice-hist[i-1].mexPrice)/hist[i-1].mexPrice*100);
      else rb.push(0);
    }
    const mean=a=>a.reduce((s,v)=>s+v,0)/a.length;
    const vari=a=>{const m=mean(a);return a.reduce((s,v)=>s+(v-m)**2,0)/(a.length-1)};
    const cov=(a,b)=>{const ma=mean(a),mb=mean(b);return a.reduce((s,v,i)=>s+(v-ma)*(b[i]-mb),0)/(a.length-1)};
    stdDev=Math.sqrt(vari(rd))*Math.sqrt(252);
    const act=rd.map((r,i)=>r-rb[i]);
    te=Math.sqrt(vari(act))*Math.sqrt(252);
    const vb=vari(rb);beta=vb>0?cov(rd,rb)/vb:1;
    ir=te>0?(rendAcum-rendBench)/te:0;
    if(hist.length>=10){const s=[...rd].sort((a,b)=>a-b);varH=s[Math.floor(s.length*.05)]||0;}
  }
  const wu=calcWU(pos,totalFondo);
  // Weekly values
  const weekStart=hist.length>=5?hist[Math.max(0,hist.length-6)]:null;
  const weekEnd=hist.length?hist[hist.length-1]:null;
  return{pos,valPort,costoTotal,efectivo,totalFondo,divTotal,rendAcum,rendBench,
    retActivo:rendAcum-rendBench,rSem,rbSem,retActivoSem:rSem-rbSem,
    stdDev,te,beta,ir,varH,wu,hist,weekStart,weekEnd};
}

// SORT
const sortState={};
function sortTable(tid,col,type='str'){
  const tbl=document.getElementById(tid);if(!tbl)return;
  const key=`${tid}_${col}`;
  sortState[key]=sortState[key]==='asc'?'desc':'asc';
  const dir=sortState[key]==='asc'?1:-1;
  const tbody=tbl.querySelector('tbody');
  const rows=[...tbody.querySelectorAll('tr')];
  rows.sort((a,b)=>{
    let av=a.cells[col]?.dataset?.val??a.cells[col]?.textContent??'';
    let bv=b.cells[col]?.dataset?.val??b.cells[col]?.textContent??'';
    if(type==='num'){av=parseFloat(av.replace(/[^0-9.\-+]/g,''))||0;bv=parseFloat(bv.replace(/[^0-9.\-+]/g,''))||0;return(av-bv)*dir;}
    return av.localeCompare(bv,'es')*dir;
  });
  rows.forEach(r=>tbody.appendChild(r));
  tbl.querySelectorAll('th').forEach((th,i)=>{th.classList.remove('asc','desc');if(i===col)th.classList.add(sortState[key]);});
}
function th(label,tid,col,type='str'){return`<th onclick="sortTable('${tid}',${col},'${type}')">${label}</th>`;}

function buildTrades(){
  const abiertas=[],cerradas=[];
  const byTicker={};
  for(const o of S.ordenes){
    if(!byTicker[o.ticker])byTicker[o.ticker]={compras:[],ventas:[]};
    if(o.tipo==='compra')byTicker[o.ticker].compras.push({...o});
    else byTicker[o.ticker].ventas.push({...o});
  }
  const pos=buildPos();
  for(const[ticker,{compras,ventas}]of Object.entries(byTicker)){
    // Match sells against buys FIFO
    let sellQueue=[...ventas];
    let buyQueue=[...compras];
    let remainingBuys=[...compras.map(b=>({...b,remaining:b.titulos}))];
    for(const venta of ventas){
      let toSell=venta.titulos;
      for(const buy of remainingBuys){
        if(toSell<=0)break;
        if(buy.remaining<=0)continue;
        const matched=Math.min(buy.remaining,toSell);
        const pnl=(venta.precio-buy.precio)*matched;
        const rend=buy.precio>0?(venta.precio-buy.precio)/buy.precio*100:0;
        const pctPortafolio=S.capitalInicial>0?buy.precio*matched/S.capitalInicial*100:0;
        cerradas.push({ticker,fechaCompra:buy.fecha,fechaVenta:venta.fecha,titulos:matched,precioCompra:buy.precio,precioVenta:venta.precio,pnl,rend,pctPortafolio});
        buy.remaining-=matched;
        toSell-=matched;
      }
    }
    // Remaining open buys
    for(const buy of remainingBuys){
      if(buy.remaining<=0)continue;
      const precioActual=pos[ticker]?.precioActual||buy.precio;
      const pnl=(precioActual-buy.precio)*buy.remaining;
      const rend=buy.precio>0?(precioActual-buy.precio)/buy.precio*100:0;
      const costo=buy.precio*buy.remaining;
      const valorMercado=precioActual*buy.remaining;
      abiertas.push({ticker,fechaCompra:buy.fecha,titulos:buy.remaining,precioCompra:buy.precio,precioActual,costo,valorMercado,pnl,rend});
    }
  }
  return{abiertas:abiertas.sort((a,b)=>b.fechaCompra.localeCompare(a.fechaCompra)),cerradas:cerradas.sort((a,b)=>b.fechaVenta.localeCompare(a.fechaVenta))};
}

    if(el)el.style.display=id===tabId?'block':'none';
  });
}

function pgRendimiento(){
  const m=calcMetrics();
  const hist=m.hist;
  // Weekly summaries
  const weeks=[];
  for(let i=0;i<hist.length;i+=5){
    const wk=hist.slice(i,i+5);
    if(!wk.length)continue;
    const ini=wk[0];const fin=wk[wk.length-1];
    const rF=ini.totalFondo>0?(fin.totalFondo-ini.totalFondo)/ini.totalFondo*100:0;
    const rB=ini.mexPrice&&fin.mexPrice?(fin.mexPrice-ini.mexPrice)/ini.mexPrice*100:null;
    weeks.push({ini:ini.date,fin:fin.date,valIni:ini.totalFondo,valFin:fin.totalFondo,rF,rB,rA:rB!=null?rF-rB:null});
  }
  return`
  <div class="sg4">
    ${stCard(fp(m.rSem),'Rend. semana fondo','','stat-grn')}

// ── RIESGO ─────────────────────────────────────────────────────────────────
function pgRiesgo(){
  const m=calcMetrics();
  const e=m.hist.length>=3;
  const vp=e?m.stdDev/Math.sqrt(252)*1.645:0;
  // Prospectivos: simulate past portfolio compositions
  const hist=m.hist;
  const pos=buildPos();
  const totalFondo=m.totalFondo;
  // Compute prospective returns using current weights × historical daily returns
  let prospRets=[];
  if(hist.length>=5&&totalFondo>0){
    for(let i=1;i<hist.length;i++){
      let portRet=0;
      for(const t in pos){
        const w=pos[t].titulos*pos[t].precioActual/totalFondo;
        const pPrev=localPrice(t,hist[i-1].date);
        const pCurr=localPrice(t,hist[i].date);
        if(pPrev&&pCurr&&pPrev>0)portRet+=w*(pCurr-pPrev)/pPrev*100;
      }
      const benchRet=hist[i].mexPrice&&hist[i-1].mexPrice&&hist[i-1].mexPrice>0?(hist[i].mexPrice-hist[i-1].mexPrice)/hist[i-1].mexPrice*100:0;
      prospRets.push({date:hist[i].date,portRet,benchRet,activo:portRet-benchRet});
    }
  }
  const prospStd=prospRets.length>1?stdDev(prospRets.map(r=>r.portRet))*Math.sqrt(252):0;
  const prospTE=prospRets.length>1?stdDev(prospRets.map(r=>r.activo))*Math.sqrt(252):0;
  const prospBeta=prospRets.length>1?betaCalc(prospRets.map(r=>r.portRet),prospRets.map(r=>r.benchRet)):1;

  return`
  <div class="sg2">
    <div class="card">
      <div class="sec-h"><div class="sec-h-bar"></div><div class="sec-h-text">Medidas absolutas — históricas</div></div>
      ${rskRow('Desv. estándar (anualizada)',e?f2(m.stdDev)+'%':'—','Volatilidad del portafolio',m.stdDev>25?'var(--red)':m.stdDev>15?'var(--amb)':'var(--grn)')}
      ${rskRow('VaR histórico 95% (diario)',m.hist.length>=10?f2(m.varH)+'%':'—','Percentil 5% de retornos históricos','var(--red)')}
      ${rskRow('VaR paramétrico 95% (diario)',e?'-'+f2(vp)+'%':'—','Z=1.645 × σ diaria','var(--red)')}
      ${rskRow('Rendimiento promedio diario',e?f2(mean(m.hist.slice(1).map((h,i)=>m.hist[i].totalFondo>0?(h.totalFondo-m.hist[i].totalFondo)/m.hist[i].totalFondo*100:0)),4)+'%':'—','Media aritmética diaria','var(--txt2)')}
    </div>
    <div class="card">
      <div class="sec-h"><div class="sec-h-bar"></div><div class="sec-h-text">Medidas relativas — históricas</div></div>
      ${rskRow('Beta vs MEXTRACK',e?f2(m.beta):'—','Sensibilidad al mercado',m.beta>1.2?'var(--red)':m.beta<0.8?'var(--amb)':'var(--grn)')}
      ${rskRow('Tracking error (anualizado)',e?f2(m.te)+'%':'—','Desv. estándar retorno activo','var(--txt2)')}
      ${rskRow('Razón de información (IR)',e?f2(m.ir):'—','Retorno activo / Tracking error',m.ir>0.5?'var(--grn)':m.ir>0?'var(--amb)':'var(--red)')}
      ${rskRow('Alfa (retorno activo acum.)',e?fp(m.retActivo):'—','Alpha generado vs benchmark',m.retActivo>=0?'var(--grn)':'var(--red)')}
    </div>
  </div>
  <div class="sg3">
    ${miStat(prospRets.length>=3?f2(prospStd)+'%':'—','Desv. estándar prospectiva','Con composición actual × hist. reciente',prospStd>25?'var(--red)':prospStd>15?'var(--amb)':'var(--grn)')}
    ${miStat(prospRets.length>=3?f2(prospTE)+'%':'—','Tracking error prospectivo','TE con composición actual','var(--txt2)')}
    ${miStat(prospRets.length>=3?f2(prospBeta):'—','Beta prospectivo','Con posición actual vs datos pasados',prospBeta>1.2?'var(--red)':prospBeta<0.8?'var(--amb)':'var(--grn)')}
  </div>
  <div class="card">
    <div class="sec-h"><div class="sec-h-bar"></div><div class="sec-h-text">Simulación prospectiva — retorno activo diario</div><span class="sec-h-sub">Si las condiciones del pasado se repiten con la posición actual</span></div>
    <div class="tw"><table id="tbl-prosp"><thead><tr>
      ${th('Fecha','tbl-prosp',0,'str')}${th('Rend. portafolio (actual weights)','tbl-prosp',1,'num')}
      ${th('Rend. MEXTRACK','tbl-prosp',2,'num')}${th('Retorno activo','tbl-prosp',3,'num')}
    </tr></thead><tbody>
    ${prospRets.slice().reverse().slice(0,20).map(r=>`<tr>
      <td class="mono">${r.date}</td>
      <td data-val="${r.portRet}" class="${cc(r.portRet)} mono">${fp(r.portRet)}</td>
      <td data-val="${r.benchRet}" class="${cc(r.benchRet)} mono">${fp(r.benchRet)}</td>
      <td data-val="${r.activo}" class="${cc(r.activo)} mono">${fp(r.activo)}</td>
    </tr>`).join('')||'<tr><td colspan="4" class="empty">Sin datos suficientes para prospectivos</td></tr>'}
    </tbody></table></div>
  </div>
  ${!e?`<div class="alert a-info">Las métricas de riesgo requieren mínimo 3 días de historial de precios con posiciones activas.</div>`:''}`;
}

function rskRow(label,val,desc,color){
  return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)">
    <div><div style="font-size:13px;font-weight:500;color:var(--txt)">${label}</div><div style="font-size:11px;color:var(--txt3);margin-top:2px">${desc}</div></div>
    <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${color}">${val}</div>
  </div>`;
}
function stdDev(arr){if(arr.length<2)return 0;const m=arr.reduce((a,b)=>a+b,0)/arr.length;return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/(arr.length-1));}
function mean(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}
function betaCalc(a,b){
  if(a.length<2)return 1;
  const ma=mean(a),mb=mean(b);
  const cov=a.reduce((s,v,i)=>s+(v-ma)*(b[i]-mb),0)/(a.length-1);
  const vb=b.reduce((s,v)=>s+(v-mb)**2,0)/(b.length-1);
  return vb>0?cov/vb:1;
}

      y:{ticks:{color:'#98A2B3',font:{size:10},callback:v=>unit==='%'?v.toFixed(1)+'%':'$'+v.toLocaleString('es-MX')},grid:{color:'rgba(0,0,0,.03)'}}}};}

function renderTreemap(){
  const container=document.getElementById('treemap');if(!container)return;
  const period=document.getElementById('tm-period')?.value||'all';
  const pos=buildPos();
  const items=[];
  const m=calcMetrics();
  for(const t in pos){
    if(t==='MEXTRAC09')continue;
    const p=pos[t];
    const vm=p.titulos*p.precioActual;
    const pp=p.costoTotal>0?p.costoTotal/p.titulos:0;
    let rend=0;
    if(period==='all'&&pp>0)rend=(p.precioActual-pp)/pp*100;
    else{
      const daysBack=period==='1w'?7:30;
      const ref=new Date();ref.setDate(ref.getDate()-daysBack);
      const refP=localPrice(t,ref.toISOString().split('T')[0]);
      rend=refP&&p.precioActual?(p.precioActual-refP)/refP*100:0;
    }
    items.push({ticker:t,value:vm,rend});
  }
  if(!items.length){container.innerHTML='<div class="empty" style="height:180px;display:flex;align-items:center;justify-content:center">Sin posiciones para mostrar</div>';return;}
  const W=container.offsetWidth||600;const H=220;
  container.style.height=H+'px';
  const cells=squarify(items.map(i=>({...i,area:i.value/items.reduce((s,x)=>s+x.value,0)*W*H})),0,0,W,H);
  container.innerHTML=cells.map(c=>{
    const abs=Math.abs(c.rend);const intensity=Math.min(abs/12,1);
    let bg;
    if(c.rend>=0){const v=Math.round(180-intensity*120);bg=`rgb(${v-30},${v+20},${v-30})`;}
    else{const v=Math.round(180-intensity*100);bg=`rgb(${v+20},${v-30},${v-30})`;}
    return`<div class="tm-cell" style="left:${c.x}px;top:${c.y}px;width:${Math.max(1,c.w-2)}px;height:${Math.max(1,c.h-2)}px;background:${bg}">
      ${c.w>45&&c.h>28?`<div class="tm-tick" style="font-size:${c.w<80?10:12}px">${c.ticker}</div>`:''}
      ${c.w>45&&c.h>45?`<div class="tm-pct">${c.rend>=0?'+':''}${c.rend.toFixed(1)}%</div>`:''}
    </div>`;
  }).join('');
}
function squarify(items,x,y,w,h){
  if(!items.length)return[];
  items=items.filter(i=>i.area>0).sort((a,b)=>b.area-a.area);
  const total=items.reduce((s,i)=>s+i.area,0);
  if(items.length===1)return[{...items[0],x,y,w:Math.max(1,w-1),h:Math.max(1,h-1)}];
  let best=Infinity,split=0,acc=0;
  for(let i=0;i<items.length-1;i++){acc+=items[i].area;const r1=acc/(total-acc);const score=Math.max(r1,1/r1);if(score<best){best=score;split=i+1;}}
  const row=items.slice(0,split),rest=items.slice(split);
  const rowTotal=row.reduce((s,i)=>s+i.area,0);const frac=rowTotal/total;
  const cells=[];
  if(w>=h){const rw=w*frac;let cy=y;for(const item of row){const ch=h*item.area/rowTotal;cells.push({...item,x,y:cy,w:Math.max(1,rw-1),h:Math.max(1,ch-1)});cy+=ch;}cells.push(...squarify(rest,x+rw,y,w-rw,h));}
  else{const rh=h*frac;let cx=x;for(const item of row){const cw=w*item.area/rowTotal;cells.push({...item,x:cx,y,w:Math.max(1,cw-1),h:Math.max(1,rh-1)});cx+=cw;}cells.push(...squarify(rest,x,y+rh,w,h-rh));}
  return cells;
}

let acIdx=-1,acFilt=[];
function acInput(v){
  const list=document.getElementById('ac-list');

  if(!q){list.classList.remove('open');return;}
  acFilt=UNIVERSO.filter(e=>e.t.includes(q)||e.n.toUpperCase().includes(q));
  if(!acFilt.length){list.classList.remove('open');return;}
  list.innerHTML=acFilt.map((e,i)=>`<div class="ac-item" id="ac-${i}" onmousedown="acSel(${i})"><span class="ac-t">${e.t}</span><span class="ac-n">${e.n}</span><span class="ac-b ${e.b}">${e.b.toUpperCase()}</span></div>`).join('');
  acIdx=-1;list.classList.add('open');
}
function acKey(e){
  const list=document.getElementById('ac-list');if(!list.classList.contains('open'))return;
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,acFilt.length-1);hiAC();e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,0);hiAC();e.preventDefault();}
  else if(e.key==='Enter'&&acIdx>=0){acSel(acIdx);e.preventDefault();}
  else if(e.key==='Escape')list.classList.remove('open');
}

// ─── EXTRA: IRT MODIFICADO ────────────────────────────────────────────────
// IRT = rendimiento acumulado considerando reinversión de dividendos y flujos
function calcIRT(hist, flujos){
  if(!hist.length) return [];
  const result = [];
  let adjustedBase = hist[0].totalFondo;
  let divAccum = 0;
  for(let i = 0; i < hist.length; i++){
    const h = hist[i];
    // Add dividends received on this date
    const dayDiv = (flujos||[]).filter(f => f.fecha === h.date && (f.tipo==='dividendo_efectivo'||f.tipo==='bmergob')).reduce((s,f)=>s+f.monto, 0);
    divAccum += dayDiv;
    const irt = adjustedBase > 0 ? (h.totalFondo + divAccum - adjustedBase) / adjustedBase * 100 : 0;
    result.push({date: h.date, irt, totalFondo: h.totalFondo, divAccum});
  }
  return result;
}

// ─── RETORNO AJUSTADO POR RIESGO (Sharpe simplificado) ────────────────────
function calcSharpe(returns){
  if(returns.length < 3) return 0;
  const m = returns.reduce((a,b)=>a+b,0)/returns.length;
  const v = returns.reduce((s,r)=>s+(r-m)**2,0)/(returns.length-1);
  const std = Math.sqrt(v);
  return std > 0 ? m/std * Math.sqrt(252) : 0;
}

// ─── COMPOSICIÓN SEMANA ANTERIOR VS ACTUAL ────────────────────────────────
function compSemanas(hist, ordenes){
  if(!hist.length) return {prev: null, curr: null};
  // Current week: last 5 trading days
  const curr = hist[hist.length-1];
  const prev = hist.length >= 6 ? hist[hist.length-6] : hist[0];
  
  function posAt(date){
    const pos = {};
    for(const o of ordenes){
      if(o.fecha > date) continue;
      if(!pos[o.ticker]) pos[o.ticker] = {titulos:0, costoTotal:0, isEtf: o.isEtf||false};
      const d = o.tipo==='compra' ? o.titulos : -o.titulos;
      if(o.tipo==='compra') pos[o.ticker].costoTotal += o.titulos*o.precio;
      pos[o.ticker].titulos += d;
    }
    for(const t in pos) if(pos[t].titulos <= 0) delete pos[t];
    return pos;
  }
  
  return {
    curr: {date: curr.date, totalFondo: curr.totalFondo, pos: posAt(curr.date)},
    prev: {date: prev.date, totalFondo: prev.totalFondo, pos: posAt(prev.date)}
  };
}

  // Daily returns for sharpe
  const dailyRets = hist.slice(1).map((h,i) => hist[i].totalFondo>0 ? (h.totalFondo-hist[i].totalFondo)/hist[i].totalFondo*100 : 0);
  const sharpe = calcSharpe(dailyRets);

  const pos = buildPos();

        ${th('P/E','tbl-mult',3,'num')}${th('EV/EBITDA','tbl-mult',4,'num')}${th('P/VL','tbl-mult',5,'num')}${th('Estilo implícito','tbl-mult',6,'str')}
      </tr></thead><tbody>
      ${allMetrics.map(e=>{
        const pe = e.pe!=null ? f2(e.pe,1)+'x' : '<span class="d">N/A</span>';
        const ev = e.ev_ebitda!=null ? f2(e.ev_ebitda,1)+'x' : '<span class="d">N/A</span>';
        const pb = e.pb!=null ? f2(e.pb,1)+'x' : '<span class="d">N/A</span>';
        const cheap = (e.pe!=null&&e.pe<12)||(e.ev_ebitda!=null&&e.ev_ebitda<6);
        const expens = (e.pe!=null&&e.pe>22)||(e.ev_ebitda!=null&&e.ev_ebitda>13);
        return `<tr>
          <td class="lbl">${e.t}</td><td class="dim">${e.name}</td><td class="dim">${e.sector}</td>
          <td data-val="${e.pe||999}" class="${e.pe?e.pe<12?'g':e.pe>22?'r':'d':'d'} mono">${pe}</td>
          <td data-val="${e.ev_ebitda||999}" class="${e.ev_ebitda?e.ev_ebitda<6?'g':e.ev_ebitda>12?'r':'d':'d'} mono">${ev}</td>
          <td data-val="${e.pb||999}" class="${e.pb?e.pb<1.5?'g':e.pb>4?'r':'d':'d'} mono">${pb}</td>
          <td><span class="pill ${cheap?'p-value':expens?'p-growth':'p-blend'}">${cheap?'Value':expens?'Caro':'Fair'}</span></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>
    </div>
  </div>

  <div id="tab-razones" style="display:none">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div class="tw"><table id="tbl-raz"><thead><tr>
        ${th('Ticker','tbl-raz',0,'str')}${th('Nombre','tbl-raz',1,'str')}
        ${th('ROE %','tbl-raz',2,'num')}${th('ROA %','tbl-raz',3,'num')}
        ${th('Margen neto %','tbl-raz',4,'num')}${th('Deuda/EBITDA','tbl-raz',5,'num')}${th('Calidad','tbl-raz',6,'str')}
      </tr></thead><tbody>
      ${allMetrics.filter(e=>e.roe!=null||e.roa!=null).map(e=>{
        const q = (e.roe>18&&e.roa>8&&(e.deuda_ebitda==null||e.deuda_ebitda<2))?'Alta':(e.roe<5||e.roa<0||e.deuda_ebitda>4)?'Baja':'Media';
        return `<tr>
          <td class="lbl">${e.t}</td><td class="dim">${e.name}</td>
          <td data-val="${e.roe||0}" class="${e.roe?e.roe>18?'g':e.roe<8?'r':'d':'d'} mono">${e.roe!=null?f2(e.roe,1)+'%':'<span class="d">N/A</span>'}</td>
          <td data-val="${e.roa||0}" class="${e.roa?e.roa>8?'g':e.roa<3?'r':'d':'d'} mono">${e.roa!=null?f2(e.roa,1)+'%':'<span class="d">N/A</span>'}</td>
          <td data-val="${e.margen_neto||0}" class="${e.margen_neto?e.margen_neto>15?'g':e.margen_neto<5?'r':'d':'d'} mono">${e.margen_neto!=null?f2(e.margen_neto,1)+'%':'<span class="d">N/A</span>'}</td>
          <td data-val="${e.deuda_ebitda||0}" class="${e.deuda_ebitda!=null?e.deuda_ebitda<1.5?'g':e.deuda_ebitda>3.5?'r':'d':'d'} mono">${e.deuda_ebitda!=null?f2(e.deuda_ebitda,1)+'x':'<span class="d">N/A</span>'}</td>
          <td><span class="pill ${q==='Alta'?'p-buy':q==='Baja'?'p-down':'p-blend'}">${q}</span></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>
    </div>
  </div>

  <div id="tab-macro" style="display:none">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div style="font-size:11px;color:var(--txt3);margin-bottom:10px">Beta de sensibilidad estimada. Positivo = misma dirección. Mayor valor absoluto = más sensible.</div>
      <div class="tw"><table id="tbl-mac"><thead><tr>
        ${th('Ticker','tbl-mac',0,'str')}${th('Nombre','tbl-mac',1,'str')}
        ${th('β Dólar (MXN/USD)','tbl-mac',2,'num')}
        ${th('β Inflación','tbl-mac',3,'num')}
        ${th('β Desempleo','tbl-mac',4,'num')}
        ${th('Cobertura natural','tbl-mac',5,'str')}
      </tr></thead><tbody>
      ${allMetrics.filter(e=>e.beta_usd!=null).map(e=>{
        const usdH = e.beta_usd > 0.4 ? '🟢 USD+' : e.beta_usd < -0.1 ? '🔴 USD-' : '⚪ Neutral';
        return `<tr>
          <td class="lbl">${e.t}</td><td class="dim">${e.name}</td>
          <td data-val="${e.beta_usd}" class="${e.beta_usd>0.4?'g':e.beta_usd<-0.1?'r':'d'} mono">${f2(e.beta_usd,2)}</td>
          <td data-val="${e.beta_inf}" class="${e.beta_inf>0.4?'a':e.beta_inf<0.1?'g':'d'} mono">${f2(e.beta_inf,2)}</td>
          <td data-val="${e.beta_desemp}" class="${e.beta_desemp<-0.3?'g':e.beta_desemp>0?'r':'d'} mono">${f2(e.beta_desemp,2)}</td>
          <td style="font-size:12px">${usdH}</td>
        </tr>`;
      }).join('')}
      </tbody></table></div>
      <div style="margin-top:12px;padding:10px 14px;background:var(--bg3);border-radius:var(--r);font-size:12px;color:var(--txt2)">
        <b>Guía de interpretación:</b> β Dólar alto (+) = empresa exportadora o con ingresos en USD (protege ante depreciación del MXN). β Inflación alto = empresa que transfiere costos al precio (pricing power). β Desempleo negativo = demanda del producto es resiliente ante pérdida de empleos.
      </div>
    </div>
  </div>

  <div id="tab-estilo" style="display:none">
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none">
      <div class="sg3" style="gap:14px;margin-bottom:16px">
        <div class="card"><div class="card-t">Growth (alto crecimiento, alta valoración)</div>
          ${allMetrics.filter(e=>e.estilo==='Growth').map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t} <span class="d" style="font-weight:400">${e.name}</span></span><span class="b mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
        <div class="card"><div class="card-t">Value (baja valoración, dividendos)</div>
          ${allMetrics.filter(e=>e.estilo==='Value').map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t} <span class="d" style="font-weight:400">${e.name}</span></span><span class="g mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
        <div class="card"><div class="card-t">Blend (características mixtas)</div>
          ${allMetrics.filter(e=>e.estilo==='Blend').slice(0,8).map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t} <span class="d" style="font-weight:400">${e.name}</span></span><span class="d mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
      </div>
      <div class="sg3" style="gap:14px">
        <div class="card"><div class="card-t" style="color:var(--grn)">▲ Tendencia alcista</div>
          ${allMetrics.filter(e=>e.trend==='alcista').map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t}</span><span class="g mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
        <div class="card"><div class="card-t" style="color:var(--red)">▼ Tendencia bajista</div>
          ${allMetrics.filter(e=>e.trend==='bajista').map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t}</span><span class="r mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
        <div class="card"><div class="card-t" style="color:var(--amb)">→ Movimiento lateral</div>
          ${allMetrics.filter(e=>e.trend==='lateral').map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px"><span class="lbl">${e.t}</span><span class="a mono">${fp(e.ret)}</span></div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function univTab(btn, tabId){
  document.querySelectorAll('#univ-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-tabla','tab-multiples','tab-razones','tab-macro','tab-estilo'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = id===tabId ? 'block' : 'none';
  });
}

// Update nav: add Estadísticos
const PAGES_EXTRA = ['dashboard','ordenes','posicion','rendimiento','riesgo','universo','analytics','flujos','estadisticos','config'];

</script>
</body>
